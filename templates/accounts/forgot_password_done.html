{% extends 'base.html' %}
{% block topbar %}{% endblock %}
{% block title %}Check your email{% endblock %}
{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center px-5 py-12 bg-n-50">
  <div class="w-full max-w-md text-center">
    <div class="w-16 h-16 bg-p-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 stroke-p-600 fill-none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-n-900 mb-2">Check your email</h1>
    <p class="text-sm text-n-500 mb-6 leading-relaxed">We've sent a password reset link. Check your inbox — it may take a minute to arrive.</p>
    <a href="{% url 'accounts:login' %}" class="btn-g btn-primary w-auto inline-flex px-8">Back to sign in</a>
  </div>
</div>
{% endblock %}
