<article class="flex-shrink-0 w-56 card overflow-hidden">
  <a href="{{ listing.get_absolute_url }}" class="block">
    <div class="relative overflow-hidden" style="height:130px">
      {% if listing.cover_image %}
        <img src="{{ listing.cover_image.image.url }}" alt="{{ listing.title }}" class="w-full h-full object-cover" loading="lazy">
      {% else %}
        <div class="w-full h-full bg-gradient-to-br from-p-100 to-p-200 flex items-center justify-center">
          <svg class="w-8 h-8 stroke-p-400 fill-none" viewBox="0 0 24 24" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        </div>
      {% endif %}
      <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
      <span class="absolute top-2 left-2 badge bg-amber-400 text-amber-900 text-[10px]">⭐ Top Pick</span>
    </div>
    <div class="p-3">
      <p class="price text-sm font-bold text-n-900">{{ listing.price_per_month }}</p>
      <p class="text-xs font-medium text-n-700 line-clamp-1 mt-0.5">{{ listing.title }}</p>
      <div class="flex items-center gap-1 mt-1">
        <svg class="w-3 h-3 stroke-n-400 fill-none flex-shrink-0" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
        <span class="text-[11px] text-n-400 truncate">{{ listing.location }}</span>
      </div>
    </div>
  </a>
</article>
