{% if request.htmx %}<span id="search-count-value" hx-swap-oob="innerHTML">{{ count }}</span>{% endif %}
{% if listings %}
  <div class="grid grid-cols-2 gap-3 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
    {% for listing in listings %}
      {% include 'components/listing_card.html' with listing=listing %}
    {% endfor %}
  </div>
{% else %}
  <div class="py-20 text-center">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-n-100">
      <svg class="h-8 w-8 fill-none stroke-n-400" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <p class="text-sm text-n-500">No listings match your search.</p>
    <a href="{% url 'search:results' %}" class="mt-4 inline-block text-sm font-semibold text-p-600">Clear filters</a>
  </div>
{% endif %}
