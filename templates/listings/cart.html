{% extends 'base.html' %}
{% load i18n humanize %}
{% block title %}{% trans "SME cart" %}{% endblock %}
{% block content %}
<div class="app-page max-w-3xl px-3 py-5" data-cart-page>
  <div class="mb-4 flex items-center justify-between"><h1 class="text-2xl font-black text-n-900">{% trans "SME cart" %}</h1><button data-cart-clear class="text-sm font-bold text-red-600">{% trans "Clear" %}</button></div>
  <div data-cart-items class="space-y-3"></div>
  <div class="mt-4 rounded-2xl bg-white p-4 shadow-sm">
    <div class="flex items-center justify-between text-lg font-black"><span>{% trans "Total" %}</span><span data-cart-total>TZS {{ cart_state.total|intcomma }}</span></div>
    <a href="{% url 'listings:checkout' %}" class="mt-4 block rounded-xl bg-p-700 py-3 text-center text-sm font-bold text-white">{% trans "Checkout" %}</a>
  </div>
</div>
{% endblock %}
